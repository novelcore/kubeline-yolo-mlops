# --- Toy experiment: 1000 samples, few epochs ---
experiment:
  name: "spacecraft-pose-toy-1k"
  description: "Toy run with 1000 samples for pipeline smoke-test"
  tags:
    project: "infinite-orbits"
    phase: "toy"

dataset:
  version: "v1"
  source: "s3"
  path_override: "s3://temp-mlops/speedplus_yolo/"
  sample_size: 1000
  seed: 42

model:
  variant: "yolov8n-pose.pt"
  pretrained_weights: null

training:
  epochs: 3
  batch_size: 16
  image_size: 640
  learning_rate: 0.01
  cos_lr: true
  lrf: 0.01
  optimizer: "AdamW"
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 1.0
  warmup_momentum: 0.8
  dropout: 0.0
  label_smoothing: 0.0
  nbs: 64
  freeze: null
  amp: true
  close_mosaic: 2
  seed: 0
  deterministic: true
  pose: 12.0
  kobj: 2.0
  box: 7.5
  cls: 0.5
  dfl: 1.5

checkpointing:
  interval_epochs: 2
  storage_path: "s3://temp-mlops/checkpoints"
  resume_from: null

early_stopping:
  patience: 50

augmentation:
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 0.0
  translate: 0.1
  scale: 0.5
  shear: 0.0
  perspective: 0.0
  flipud: 0.0
  fliplr: 0.0
  mosaic: 1.0
  mixup: 0.0
  copy_paste: 0.0
  erasing: 0.4
  bgr: 0.0

registration:
  registered_model_name: null
  promote_to: null

resources:
  gpu_count: 1
  gpu_type: "A100-40GB"
  cpu_cores: 32
  memory_gb: 128

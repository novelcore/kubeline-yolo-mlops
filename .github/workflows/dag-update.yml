name: ML Pipeline CI - DAG Update

on:
  push:
    branches: [main, develop]
    paths:
      - 'kubeline.yaml'

env:
  APP_NAME: ${{ vars.KUBECORE_APP_NAME }}
  PROJECT_NAME: ${{ vars.KUBECORE_PROJECT_NAME }}
  ML_NAMESPACE: ${{ vars.KUBECORE_ML_NAMESPACE }}
  LAKEFS_ENDPOINT: ${{ vars.KUBECORE_LAKEFS_ENDPOINT }}
  MLFLOW_ENDPOINT: ${{ vars.KUBECORE_MLFLOW_ENDPOINT }}
  REGISTRY: ${{ vars.KUBECORE_REGISTRY }}

jobs:
  render-and-dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        uses: mikefarah/yq@master

      - name: Determine target branch
        id: branch
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "target=main" >> $GITHUB_OUTPUT
          else
            echo "target=dev" >> $GITHUB_OUTPUT
          fi

      - name: Read kubeline.yaml and render WorkflowTemplate
        id: render
        run: |
          BRANCH="${{ steps.branch.outputs.target }}"

          # Build DAG tasks YAML from kubeline.yaml
          TASKS=""
          TEMPLATES=""
          STEP_COUNT=$(yq e '.steps | length' kubeline.yaml)

          for i in $(seq 0 $(($STEP_COUNT - 1))); do
            NAME=$(yq e ".steps[$i].name" kubeline.yaml)
            PATH_DIR=$(yq e ".steps[$i].path" kubeline.yaml)
            COMPUTE=$(yq e ".steps[$i].compute // \"cpu\"" kubeline.yaml)
            DEPS=$(yq e ".steps[$i].dependencies // []" kubeline.yaml)

            # Build DAG task entry
            TASK="      - name: $NAME\n        template: $NAME"
            if [ "$DEPS" != "[]" ]; then
              TASK="$TASK\n        dependencies:"
              for DEP in $(yq e ".steps[$i].dependencies[]" kubeline.yaml); do
                TASK="$TASK\n        - $DEP"
              done
            fi
            TASKS="${TASKS}${TASK}\n"

            # Build template entry
            NODESELECTOR="      nodeSelector:\n        karpenter.sh/nodepool: cpu"
            TOLERATIONS=""
            GPU_LIMIT=""
            if [ "$COMPUTE" = "gpu" ]; then
              NODESELECTOR="      nodeSelector:\n        karpenter.sh/nodepool: gpu"
              TOLERATIONS="      tolerations:\n      - key: nvidia.com/gpu\n        operator: Exists\n        effect: NoSchedule"
              GPU_LIMIT="\n            nvidia.com/gpu: \"1\""
            fi

            IMAGE="${REGISTRY}/${APP_NAME}-${PATH_DIR}:latest"

            TEMPLATE="    - name: $NAME\n${NODESELECTOR}"
            if [ -n "$TOLERATIONS" ]; then
              TEMPLATE="$TEMPLATE\n${TOLERATIONS}"
            fi
            TEMPLATE="$TEMPLATE\n      container:\n        image: $IMAGE\n        resources:\n          requests:\n            cpu: \"250m\"\n            memory: \"512Mi\"\n          limits:\n            cpu: \"1\"\n            memory: \"2Gi\"${GPU_LIMIT}"
            TEMPLATES="${TEMPLATES}${TEMPLATE}\n"
          done

          # Render full WorkflowTemplate
          cat > /tmp/workflow-template.yaml << WFTEOF
          apiVersion: argoproj.io/v1alpha1
          kind: WorkflowTemplate
          metadata:
            name: ${APP_NAME}-pipeline
            namespace: ${ML_NAMESPACE}
            labels:
              platform.kubecore.io/project: ${PROJECT_NAME}
              platform.kubecore.io/app: ${APP_NAME}
              platform.kubecore.io/managed-by: ci-dag-update
          spec:
            serviceAccountName: argo-workflow
            entrypoint: pipeline-dag
            arguments:
              parameters:
              - name: lakefs-endpoint
                value: "${LAKEFS_ENDPOINT}"
              - name: mlflow-endpoint
                value: "${MLFLOW_ENDPOINT}"
              - name: project-name
                value: "${PROJECT_NAME}"
              - name: lakefs-repo
                value: "${APP_NAME}"
              - name: branch
                value: "${BRANCH}"
            templates:
            - name: pipeline-dag
              dag:
                tasks:
          $(echo -e "$TASKS")
          $(echo -e "$TEMPLATES")
          WFTEOF

          # Base64 encode for dispatch payload
          WFT_CONTENT=$(cat /tmp/workflow-template.yaml | base64 -w0)
          echo "wft_content=$WFT_CONTENT" >> $GITHUB_OUTPUT

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.KUBECORE_APP_ID }}
          private-key: ${{ secrets.KUBECORE_APP_PKEY }}
          owner: ${{ github.repository_owner }}

      - name: Dispatch DAG update to gitops repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: ${{ github.repository_owner }}/${{ env.PROJECT_NAME }}
          event-type: ml-dag-update
          client-payload: |
            {
              "app_name": "${{ env.APP_NAME }}",
              "branch": "${{ steps.branch.outputs.target }}",
              "wft_content": "${{ steps.render.outputs.wft_content }}"
            }

steps:
  - name: config-validation
    path: config_validation
    compute: cpu
    command: ["config-validation"]
    args: ["run"]
    dependencies: []

  - name: dataset-loading
    path: dataset_loading
    compute: cpu
    command: ["dataset-loading"]
    args: ["run"]
    dependencies:
      - config-validation

  - name: model-training
    path: model_training
    compute: gpu
    command: ["model-training"]
    args: ["run"]
    resources:
      requests:
        cpu: "1"
        memory: "4Gi"
      limits:
        cpu: "4"
        memory: "16Gi"
    dependencies:
      - dataset-loading

  - name: model-registration
    path: model_registration
    compute: cpu
    command: ["model-registration"]
    args: ["run"]
    dependencies:
      - model-training

pipeline_name: infinite-orbits-example
version: "1.0.0"

dataset:
  source_path: /data/raw/train.parquet
  format: parquet
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

training:
  model_name: orbits-bert-base
  epochs: 10
  batch_size: 32
  learning_rate: 0.0001
  optimizer: adamw
  seed: 42
  output_dir: /artifacts/checkpoints

registration:
  registry_url: https://registry.infiniteorbits.io
  model_name: orbits-bert-base-finetuned
  tags:
    - v1.0.0
    - experiment
  promote_to: staging
